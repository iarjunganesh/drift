<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="480" viewBox="0 0 1440 480" role="img" aria-labelledby="title desc">
  <title id="title">DRIFT — release intelligence for AI infrastructure</title>
  <desc id="desc">A light DRIFT hero banner. A primary release signal enters a GPU-like compute lattice and branches into cited evidence, human review, and a bounded engineering check.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#edf8ff"/><stop offset=".52" stop-color="#dbeafe"/><stop offset="1" stop-color="#eee7ff"/></linearGradient>
    <linearGradient id="signal" x1="0" x2="1"><stop stop-color="#0284c7"/><stop offset=".52" stop-color="#0f766e"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="chip" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#d8f2ff"/><stop offset="1" stop-color="#e5ddff"/></linearGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientTransform="translate(232 90) rotate(45) scale(390)"><stop stop-color="#38bdf8" stop-opacity=".16"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/></radialGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientTransform="translate(1300 100) rotate(135) scale(340)"><stop stop-color="#a78bfa" stop-opacity=".19"/><stop offset="1" stop-color="#a78bfa" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" fill="none" stroke="#2563eb" stroke-opacity=".065"/></pattern>
    <filter id="shadow" x="-20%" y="-30%" width="150%" height="170%"><feDropShadow dx="0" dy="15" stdDeviation="17" flood-color="#1e3a8a" flood-opacity=".18"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="1440" height="480" rx="34" fill="url(#bg)"/>
  <rect width="1440" height="480" rx="34" fill="url(#grid)"/>
  <circle cx="225" cy="90" r="360" fill="url(#cyanGlow)"/><circle cx="1300" cy="110" r="330" fill="url(#violetGlow)"/>
  <path d="M0 407C210 332 359 494 619 396S1032 318 1440 423V480H0Z" fill="#c7d2fe" fill-opacity=".22"/>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="78" y="103" fill="#0b1b3a" font-size="56" font-weight="800" letter-spacing="8">DRIFT</text>
    <text x="82" y="139" fill="#0369a1" font-size="15" font-weight="800" letter-spacing="2.8">RELEASE INTELLIGENCE FOR AI INFRASTRUCTURE</text>
    <rect x="80" y="163" width="68" height="4" rx="2" fill="url(#signal)"/>
    <text x="78" y="231" fill="#0b1b3a" font-size="39" font-weight="800" letter-spacing="-1.4">Know the change before</text>
    <text x="78" y="280" fill="#0b1b3a" font-size="39" font-weight="800" letter-spacing="-1.4">it becomes your incident.</text>
    <text x="82" y="330" fill="#475569" font-size="19">Primary releases become cited, review-gated engineering checks.</text>
    <rect x="80" y="367" width="287" height="39" rx="19.5" fill="#0f766e"/>
    <text x="224" y="393" text-anchor="middle" fill="#f0fdfa" font-size="13" font-weight="800" letter-spacing="1.7">CITED · BOUNDED · INSPECTABLE</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="720" y="58" width="638" height="356" rx="28" fill="#f8fbff" fill-opacity=".82" stroke="#2563eb" stroke-opacity=".24"/>
    <path d="M740 105H1338" stroke="#0369a1" stroke-opacity=".14"/>
    <circle cx="760" cy="83" r="5" fill="#0284c7"/>
    <text x="777" y="89" fill="#1e3a5f" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" letter-spacing="2.1">DRIFT EVIDENCE PATH</text>
    <text x="1318" y="89" text-anchor="end" fill="#0f766e" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" letter-spacing="1.6">HUMAN-GATED</text>
  </g>

  <g fill="none" stroke="url(#signal)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M895 215H987"/><path d="M1169 215H1195V164H1212"/><path d="M1169 215H1212"/><path d="M1169 215H1195V266H1212"/>
  </g>
  <g fill="none" stroke="#0284c7" stroke-opacity=".22" stroke-width="13" filter="url(#glow)"><path d="M895 215H987M1169 215H1195V164H1212"/></g>
  <g fill="#0284c7"><circle cx="895" cy="215" r="7"/><circle cx="987" cy="215" r="7"/><circle cx="1169" cy="215" r="7"/><circle cx="1212" cy="164" r="7"/><circle cx="1212" cy="215" r="7"/><circle cx="1212" cy="266" r="7"/></g>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="772" y="166" fill="#0369a1" font-size="11" font-weight="800" letter-spacing="1.5">PRIMARY RELEASE</text>
    <text x="772" y="194" fill="#0b1b3a" font-size="19" font-weight="800">Release</text>
    <text x="1231" y="158" fill="#6d28d9" font-size="12" font-weight="800" letter-spacing="1.5">EVIDENCE</text>
    <text x="1231" y="181" fill="#0b1b3a" font-size="18" font-weight="800">Frozen span</text>
    <text x="1231" y="209" fill="#0f766e" font-size="12" font-weight="800" letter-spacing="1.5">REVIEW</text>
    <text x="1231" y="232" fill="#0b1b3a" font-size="18" font-weight="800">Human notes</text>
    <text x="1231" y="260" fill="#0369a1" font-size="12" font-weight="800" letter-spacing="1.5">CHECK</text>
    <text x="1231" y="283" fill="#0b1b3a" font-size="18" font-weight="800">Bounded action</text>
  </g>

  <g transform="translate(987 136)" filter="url(#shadow)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect width="182" height="158" rx="25" fill="url(#chip)" stroke="#0284c7" stroke-width="2"/>
    <rect x="21" y="20" width="140" height="118" rx="17" fill="#f8fdff" stroke="#0284c7" stroke-opacity=".7"/>
    <path d="M38 57H144M38 89H144M38 121H144M64 38V140M104 38V140" stroke="#7dd3fc" stroke-width="2"/>
    <rect x="49" y="58" width="84" height="50" rx="10" fill="#d7f7f2" stroke="#0f766e" stroke-opacity=".78"/>
    <text x="91" y="91" text-anchor="middle" fill="#115e59" font-size="22" font-weight="800" letter-spacing="2">GPU</text>
    <text x="91" y="128" text-anchor="middle" fill="#0369a1" font-size="10" font-weight="800" letter-spacing="1.3">COMPUTE LATTICE</text>
    <g stroke="#0284c7" stroke-width="3" stroke-linecap="round"><path d="M19 12H39M19 32H39M19 126H39M19 146H39M143 12H163M143 32H163M143 126H163M143 146H163"/><path d="M10 47V67M10 91V111M172 47V67M172 91V111"/></g>
  </g>
</svg>
